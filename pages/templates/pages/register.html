{% extends 'pages/base.html' %}

{% block content %}
{% load static %}

	<div class="container-fluid register">
		<div class="row center-text">
			<div class='col-3'></div>
			<div class='col-6 formZone'>
			
				<form id="identifiantInput" method="post">

					{% csrf_token %}

					<div class="row">
						<div class="col text-center">
					   		<label for="{{ identifiantForm.name.id_for_label }}">name:</label>
					   		{{ identifiantForm.name }}
						</div>
					</div>

					<div class="row">
						<div class="col text-center">
					   		<label for="{{ identifiantForm.mail.id_for_label }}">adresse mail:</label>
					   		{{ identifiantForm.mail }}
						</div>
					</div>

					<div class="row">
					   	<div class="col text-center">
							<label for="{{ identifiantForm.password.id_for_label }}">mot de passe:</label>
					   		{{ identifiantForm.password }}
						</div>
					</div>


					<div class="row buttonZone">
						<div class="col text-center">
							<button id="inscriptionButton" type="submit" class="btn btn-success" formaction="{% url 'authentification:register' %}">S'inscrire</button>
						</div>
					</div>

				</form>
			</div>
			<div class='col-3'></div>
		</div>
	</div>

{% endblock %}
